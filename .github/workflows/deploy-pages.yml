name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/*
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with localization
        run: npx ng build --configuration=production --base-href=/portfolio/

      - name: Prepare deployment structure
        run: |
          # Angular creates dist/portfolio/en/ and dist/portfolio/pl/
          # Copy 404.html to each locale folder for SPA routing
          cp ./dist/portfolio/en/index.html ./dist/portfolio/en/404.html
          cp ./dist/portfolio/pl/index.html ./dist/portfolio/pl/404.html
          # Create root redirect to English
          echo '<html><head><meta http-equiv="refresh" content="0;url=/portfolio/en/"></head></html>' > ./dist/portfolio/index.html
          cp ./dist/portfolio/index.html ./dist/portfolio/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/portfolio'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
